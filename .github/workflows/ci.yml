# .github/workflows/ci.yml
# ПАТЧ: python-version '3.8' → '3.11'
#   google-genai>=1.0.0 и ibm-watsonx-ai требуют Python ≥ 3.9/3.11
#   actions/checkout и actions/setup-python обновлены до v4

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4         # было v2

      - name: Set up Python
        uses: actions/setup-python@v5     # было v2
        with:
          python-version: '3.11'          # было '3.8' — ГЛАВНАЯ ПРИЧИНА ОШИБКИ

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build package
        run: |
          set -euxo pipefail
          pip install build
          python -m build --outdir dist

      - name: List artifacts
        run: |
          if [ ! -d dist ]; then
            echo "dist directory does not exist!"
            exit 1
          fi
          if [ -z "$(ls -A dist)" ]; then
            echo "dist is empty!"
            exit 1
          else
            ls dist
          fi
