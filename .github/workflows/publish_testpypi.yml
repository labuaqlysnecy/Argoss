name: 📦 Publish to TestPyPI

# Publishes argos-universalsigtrip to TestPyPI via OIDC Trusted Publishing.
# No PYPI_TOKEN required — authentication is handled by GitHub's OIDC provider.
#
# One-time setup on test.pypi.org:
#   1. Log in to https://test.pypi.org
#   2. Go to your account → Publishing → Add a new publisher
#   3. Fill in:
#      - PyPI project name: argos-universalsigtrip
#      - Owner:             labuaqlysnecy
#      - Repository:        Argoss
#      - Workflow file:     publish_testpypi.yml
#      - Environment name:  (leave blank)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for OIDC Trusted Publishing

jobs:
  publish-testpypi:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
